name: Moodle Plugin CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: moodle
          POSTGRES_PASSWORD: moodle
          POSTGRES_DB: moodle
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_USER: moodle
          MYSQL_PASSWORD: moodle
          MYSQL_DATABASE: moodle
          MYSQL_ROOT_PASSWORD: moodle
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    strategy:
      fail-fast: false
      matrix:
        include:
          # Moodle 4.4 — PHP 8.1 / 8.2 / 8.3
          - php: '8.1'
            moodle-branch: MOODLE_404_STABLE
            database: pgsql
          - php: '8.2'
            moodle-branch: MOODLE_404_STABLE
            database: mariadb
          # Moodle 4.5 LTS — PHP 8.1 / 8.2 / 8.3
          - php: '8.1'
            moodle-branch: MOODLE_405_STABLE
            database: pgsql
          - php: '8.2'
            moodle-branch: MOODLE_405_STABLE
            database: mariadb
          - php: '8.3'
            moodle-branch: MOODLE_405_STABLE
            database: pgsql

    steps:
      - name: Check out plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, curl, zip, gd, intl, pgsql, pdo_pgsql, mysqli, pdo_mysql
          coverage: none

      - name: Install moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist \
            moodlehq/moodle-plugin-ci ci ^4
          echo "$(cd ci && pwd)/bin" >> $GITHUB_PATH
          echo "$(cd ci && pwd)/vendor/bin" >> $GITHUB_PATH

      - name: Install Moodle (${{ matrix.moodle-branch }}, ${{ matrix.database }})
        run: |
          moodle-plugin-ci install \
            --plugin ./plugin \
            --db-host=127.0.0.1 \
            --db-type=${{ matrix.database }} \
            --db-user=moodle \
            --db-pass=moodle \
            --db-name=moodle \
            --branch=${{ matrix.moodle-branch }}
        env:
          DB: ${{ matrix.database }}

      - name: PHP Lint
        run: moodle-plugin-ci phplint
        if: ${{ !cancelled() }}

      - name: PHP Mess Detector
        run: moodle-plugin-ci phpmd
        if: ${{ !cancelled() }}
        continue-on-error: true

      - name: Moodle Code Checker (phpcs)
        run: moodle-plugin-ci codechecker --max-warnings 0
        if: ${{ !cancelled() }}

      - name: Moodle PHPDoc Checker
        run: moodle-plugin-ci phpdoc --max-warnings 0
        if: ${{ !cancelled() }}

      - name: Validate plugin structure
        run: moodle-plugin-ci validate
        if: ${{ !cancelled() }}

      - name: Check upgrade savepoints
        run: moodle-plugin-ci savepoints
        if: ${{ !cancelled() }}

      - name: PHPUnit
        run: moodle-plugin-ci phpunit --fail-on-warning
        if: ${{ !cancelled() }}
