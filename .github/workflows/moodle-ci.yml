name: Moodle Plugin CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_ROOT_PASSWORD: moodle
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    strategy:
      fail-fast: false
      matrix:
        include:
          # Moodle 4.5 LTS — PHP 8.1 / pgsql
          - php: '8.1'
            moodle-branch: MOODLE_405_STABLE
            database: pgsql
            db-user: postgres
            db-pass: postgres
            db-port: 5432
          # Moodle 4.5 LTS — PHP 8.2 / mariadb
          - php: '8.2'
            moodle-branch: MOODLE_405_STABLE
            database: mariadb
            db-user: root
            db-pass: moodle
            db-port: 3306
          # Moodle 4.5 LTS — PHP 8.3 / pgsql
          - php: '8.3'
            moodle-branch: MOODLE_405_STABLE
            database: pgsql
            db-user: postgres
            db-pass: postgres
            db-port: 5432

    steps:
      - name: Check out plugin
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, curl, zip, gd, intl, pgsql, pdo_pgsql, mysqli, pdo_mysql
          ini-values: max_input_vars=5000
          coverage: none

      - name: Install moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist \
            moodlehq/moodle-plugin-ci ci ^4
          echo "$(cd ci && pwd)/bin" >> $GITHUB_PATH
          echo "$(cd ci && pwd)/vendor/bin" >> $GITHUB_PATH

      - name: Install Moodle (${{ matrix.moodle-branch }}, ${{ matrix.database }})
        run: |
          moodle-plugin-ci install \
            --plugin ./plugin \
            --moodle /home/runner/work/moodle \
            --db-host=127.0.0.1 \
            --db-port=${{ matrix.db-port }} \
            --db-type=${{ matrix.database }} \
            --db-user=${{ matrix.db-user }} \
            --db-pass=${{ matrix.db-pass }} \
            --db-name=moodle \
            --branch=${{ matrix.moodle-branch }}
        env:
          DB: ${{ matrix.database }}

      - name: PHP Lint
        run: moodle-plugin-ci phplint ./plugin
        if: ${{ !cancelled() }}

      - name: PHP Mess Detector
        run: moodle-plugin-ci phpmd ./plugin
        if: ${{ !cancelled() }}
        continue-on-error: true

      - name: Moodle Code Checker (phpcs)
        run: moodle-plugin-ci codechecker ./plugin --max-warnings 0
        if: ${{ !cancelled() }}

      - name: Moodle PHPDoc Checker
        run: moodle-plugin-ci phpdoc ./plugin --max-warnings 0
        if: ${{ !cancelled() }}

      - name: Validate plugin structure
        run: moodle-plugin-ci validate ./plugin
        if: ${{ !cancelled() }}

      - name: Check upgrade savepoints
        run: moodle-plugin-ci savepoints ./plugin
        if: ${{ !cancelled() }}

      - name: Install required locales
        run: |
          sudo apt-get update
          sudo apt-get install -y locales language-pack-en
          sudo localedef -i en_AU -f UTF-8 en_AU.UTF-8
          locale -a | grep en_AU

      - name: PHPUnit
        run: moodle-plugin-ci phpunit ./plugin --fail-on-warning
        if: ${{ !cancelled() }}
        env:
          LANG: en_AU.UTF-8
          LC_ALL: en_AU.UTF-8
